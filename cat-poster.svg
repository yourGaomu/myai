<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800" role="img" aria-labelledby="title desc">
  <title id="title">Quiet Cat Poster</title>
  <desc id="desc">A minimal black and white typography-driven poster inspired by a small cat.</desc>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&amp;display=swap');
    text { font-family: 'Inter', Arial, sans-serif; fill: #111111; }
    .title { font-size: 78px; font-weight: 700; letter-spacing: 0.02em; }
    .sub { font-size: 20px; font-weight: 300; letter-spacing: 0.16em; }
    .meta { font-size: 11px; font-weight: 500; letter-spacing: 0.28em; }
    .line { stroke: #111111; stroke-width: 1.4; vector-effect: non-scaling-stroke; }
    .soft { opacity: 0.28; }
  </style>

  <rect width="600" height="800" fill="#fbfaf7"/>

  <!-- Single deviation: the small triangular ears break the strict left column. -->
  <path d="M164 242 L189 198 L214 242" fill="none" class="line"/>
  <path d="M386 242 L411 198 L436 242" fill="none" class="line"/>

  <line x1="126" y1="242" x2="474" y2="242" class="line"/>
  <line x1="126" y1="566" x2="474" y2="566" class="line soft"/>

  <text x="126" y="352" class="title">SMALL</text>
  <text x="126" y="435" class="title">CAT</text>

  <text x="130" y="505" class="sub">SOFT STEPS / CLEAR EYES</text>

  <text x="474" y="682" class="meta" text-anchor="end">NO. 09 · NIGHT WINDOW</text>
</svg>
